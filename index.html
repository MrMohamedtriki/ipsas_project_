<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />

</head>

<body>
  <button id="theme-toggle"
    style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 0;">🌙</button>

  <h1>Password Generator</h1>

  <div id="password-box">
    <p id="password-output">Your password will appear here</p>
    <button id="copy-btn">Copy</button>
  </div>

  <div id="strength-box">
    <p id="crack-time" style="font-size: 0.95rem; font-weight: bold; width: 100%; text-align: center; margin: 10px 0;">
    </p>
  </div>
  <div id="options">

    <label>
      Password Length:
      <input type="number" id="length" value="12" min="8" max="40" step="1"
        onkeypress="return event.charCode >= 48 && event.charCode <= 57" />
    </label>

    <label>
      <input type="checkbox" id="uppercase" checked />
      Uppercase Letters (A-Z)
    </label>

    <label>
      <input type="checkbox" id="lowercase" checked />
      Lowercase Letters (a-z)
    </label>

    <label>
      <input type="checkbox" id="numbers" checked />
      Numbers (0-9)
    </label>

    <label>
      <input type="checkbox" id="symbols" />
      Symbols (!@#$...)
    </label>

  </div>

  <button id="generate-btn">Generate Password</button>

  <div id="history-box">
    <p id="history-title">Recent Passwords</p>
    <ul id="history-list"></ul>
    <button id="clear-btn"
      style="display: none; margin-top: 10px; font-size: 0.8rem; padding: 4px 8px; border-color: #c0392b; background: #e74c3c; color: white;">Clear
      History</button>
    <button id="download-btn"
      style="display: none; margin-top: 10px; font-size: 0.8rem; padding: 4px 8px; border-color: #27ae60; background: #2ecc71; color: white;">Download
      .txt</button>
  </div>

  <script src="script.js"></script>

</body>

</html>
