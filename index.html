<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />

</head>

<body>
  <!-- Theme toggle button -->
  <button id="theme-toggle">🌙</button>

  <h1>Password Generator</h1>

  <!-- Where the password shows up -->
  <div id="password-box">
    <p id="password-output">Your password will appear here</p>
    <button id="copy-btn">Copy</button>
  </div>

  <div id="strength-box">
    <p id="crack-time"></p>
  </div>
  <!-- Checkboxes and length input -->
  <div id="options">

    <label>
      Password Length:
      <input type="number" id="length" value="12" min="8" max="40" step="1"
        onkeypress="return event.charCode >= 48 && event.charCode <= 57" />
    </label>

    <label>
      <input type="checkbox" id="uppercase" checked />
      Uppercase Letters (A-Z)
    </label>

    <label>
      <input type="checkbox" id="lowercase" checked />
      Lowercase Letters (a-z)
    </label>

    <label>
      <input type="checkbox" id="numbers" checked />
      Numbers (0-9)
    </label>

    <label>
      <input type="checkbox" id="symbols" />
      Symbols (!@#$...)
    </label>

  </div>

  <button id="generate-btn">Generate Password</button>

  <!-- List of old passwords -->
  <div id="history-box">
    <p id="history-title">Recent Passwords</p>
    <ul id="history-list"></ul>
    <button id="clear-btn">Clear History</button>
    <button id="download-btn">Download .txt</button>
  </div>

  <script src="script.js"></script>

</body>

</html>
